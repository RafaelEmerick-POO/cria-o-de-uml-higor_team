name: Atividade
description: Card padrao para o cenario de modelagem UML.
title: "[Atividade] "
body:
  - type: markdown
    attributes:
      value: |
        Use este card como unidade minima de trabalho. Vincule o card ao pull request correspondente.

  - type: input
    id: objective
    attributes:
      label: Objetivo
      description: O que precisa ser concluido?
      placeholder: Modelar o C++, modelar o Python, validar Mermaid Live ou fechar a entrega.
    validations:
      required: true

  - type: textarea
    id: files
    attributes:
      label: Arquivos afetados
      description: Quais arquivos devem mudar?
      placeholder: Ex.: docs/diagrama_cpp.md, docs/diagrama_python.md
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Criterio de aceite
      description: Como o professor vai saber que esta pronto?
      placeholder: Ex.: diagrama renderiza, representa corretamente o codigo, PR com evidencias.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidencia
      description: O que deve ser anexado ao PR?
      placeholder: Link do Mermaid Live, saida do terminal, print, justificativa tecnica.
    validations:
      required: true
